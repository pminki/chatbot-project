version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: chatbot-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ai_chatbot_db
      MYSQL_USER: chatbot_user
      MYSQL_PASSWORD: chatbot_password
    ports:
      - "3306:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mariadb_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: chatbot-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=sk-your-api-key-here # 실제 키로 변경 필요
      - DATABASE_URL=mysql+pymysql://chatbot_user:chatbot_password@db:3306/ai_chatbot_db?charset=utf8mb4
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_db
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: chatbot-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mariadb_data:
  chroma_data: