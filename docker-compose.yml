services:
  # 1. 데이터베이스 컨테이너 (MariaDB)
  db:
    image: mariadb:11.4
    container_name: chatbot-db
    restart: always
    environment:
      # .env 파일의 값을 자동으로 읽어옵니다.
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mariadb_data:/var/lib/mysql

  # 2. 백엔드 컨테이너 (FastAPI + LangGraph)
  backend:
    build: ./backend
    container_name: chatbot-backend
    restart: always
    ports:
      # .env의 BACKEND_PORT 값을 호스트 포트로 사용 (기본값 8000)
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER}
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      - DATABASE_URL=${DATABASE_URL}
      - CHROMA_DIR=${CHROMA_DIR:-/app/chroma_db}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      # [추가] 구글 클라우드 환경 변수
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION:-asia-northeast3}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-key.json # 컨테이너 내부의 키 파일 경로
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_db
      # [추가] 로컬 PC의 인증 파일을 컨테이너 내부로 마운트 (읽기 전용)
      # 주의: 아래 '~/.config/gcloud/...' 부분을 방금 메모하신 실제 경로로 수정하세요!
      - C:\Users\user\AppData\Roaming\gcloud\application_default_credentials.json:/app/gcp-key.json:ro
    depends_on:
      - db

  # 3. 프론트엔드 컨테이너 (React Web Component)
  frontend:
    build: ./frontend
    container_name: chatbot-frontend
    restart: always
    ports:
      # .env의 FRONTEND_PORT 값을 호스트 포트로 사용 (기본값 3000)
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  mariadb_data:
  chroma_data:
