<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .chat-visible {
      transform: scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    .chat-hidden {
      transform: scale(0.9);
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>

<body class="bg-slate-50 min-h-screen">
  <div class="max-w-5xl mx-auto py-12 px-6">
    <!-- RAG 관리 섹션 -->
    <div class="mb-12">
      <ai-rag-manager></ai-rag-manager>
    </div>

    <!-- 챗봇 플로팅 버튼 -->
    <button id="chat-toggle"
      class="fixed bottom-8 right-8 w-16 h-16 bg-indigo-600 text-white rounded-full shadow-xl hover:bg-indigo-700 hover:scale-110 active:scale-95 transition-all flex items-center justify-center z-50 group">
      <svg class="w-8 h-8 group-hover:rotate-12 transition-transform" fill="none" stroke="currentColor"
        viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
      </svg>
    </button>

    <!-- 챗봇 컨테이너: 디자인 요소는 내부 ai-chatbot 컴포넌트가 책임지며, 화면 크기에 따라 반응형으로 크기 조절됨 -->
    <div id="chat-container"
      class="fixed bottom-24 right-4 left-4 w-auto h-[calc(100vh-120px)] max-h-[700px] sm:bottom-28 sm:right-8 sm:left-auto sm:w-[500px] sm:h-[700px] chat-hidden transition-all duration-300 origin-bottom-right z-50">

      <div class="h-full">
        <ai-chatbot user-id="lms-user-001"></ai-chatbot>
      </div>
    </div>

  </div>

  <script>
    const toggleBtn = document.getElementById('chat-toggle');
    const container = document.getElementById('chat-container');
    let isOpen = false;

    const toggleChat = () => {
      isOpen = !isOpen;
      if (isOpen) {
        container.classList.remove('chat-hidden');
        container.classList.add('chat-visible');
        toggleBtn.classList.add('rotate-90', 'bg-slate-600');
      } else {
        container.classList.remove('chat-visible');
        container.classList.add('chat-hidden');
        toggleBtn.classList.remove('rotate-90', 'bg-slate-600');
      }
    };

    // 토글 버튼 이벤트
    toggleBtn.addEventListener('click', toggleChat);

    // React 컴포넌트 내부의 'X' 버튼 클릭 시 발생하는 close-chat 이벤트 수신
    window.addEventListener('close-chat', () => {
      if (isOpen) toggleChat();
    });
  </script>


  <script type="module" src="/chatbot.js"></script>
</body>



</html>
